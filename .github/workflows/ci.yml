name: openclaw-enterprise-ci

on:
  push:
    branches: ["main", "work"]
    paths:
      - "openclaw-enterprise/**"
      - ".github/workflows/**"
  pull_request:
    branches: ["main", "work"]
    paths:
      - "openclaw-enterprise/**"
      - ".github/workflows/**"

jobs:
  lint-test-security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          if [ -f openclaw-enterprise/scripts/requirements-runtime.txt ]; then
            pip install -r openclaw-enterprise/scripts/requirements-runtime.txt
          fi
          pip install ruff bandit pip-audit

      - name: Lint (ruff)
        run: ruff check openclaw-enterprise/scripts

      - name: Syntax check
        run: python -m compileall -q openclaw-enterprise/scripts

      - name: SAST (bandit)
        run: bandit -q -r openclaw-enterprise/scripts -lll

      - name: Dependency scan (pip-audit)
        run: pip-audit

      - name: Secret scan (basic)
        run: |
          if grep -R -n -E "(AKIA[0-9A-Z]{16}|OPENAI_API_KEY=sk-|ANTHROPIC_API_KEY=sk-ant|TELEGRAM_TOKEN=[0-9]{8,})" openclaw-enterprise/ ; then
            echo "Potential secrets detected in openclaw-enterprise/"
            exit 1
          fi
          echo "No hardcoded secrets found."
